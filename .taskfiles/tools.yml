version: "3"

# External tool installation with integrity verification
# Uses .tool_checksums file for SHA256 verification

vars:
  TOOLS_DIR:
    sh: |
      dir="{{.TOOLS_DIR}}"
      if [ -z "$dir" ]; then
        if [ -w /usr/local/bin ]; then
          dir="/usr/local/bin"
        else
          dir="${HOME}/.local/bin"
          mkdir -p "$dir"
        fi
      fi
      echo "$dir"
  CHECKSUMS_FILE: "{{.ROOT_DIR}}/.tool_checksums"

tasks:
  install-weaver:
    desc: "Install weaver with SHA256 verification"
    vars:
      WEAVER_URL: "https://github.com/open-telemetry/weaver/releases/download/{{.WEAVER_VERSION}}/weaver-x86_64-unknown-linux-gnu.tar.xz"
    cmds:
      - curl -fL -o /tmp/weaver.tar.xz "{{.WEAVER_URL}}"
      - |
        WEAVER_SHA=$(grep "weaver/{{.WEAVER_VERSION}}/linux/x86_64" {{.CHECKSUMS_FILE}} | cut -d: -f2 | tr -d ' ')
        echo "${WEAVER_SHA}  /tmp/weaver.tar.xz" | sha256sum -c -
      - tar -xJf /tmp/weaver.tar.xz -C /tmp
      - install /tmp/weaver-x86_64-unknown-linux-gnu/weaver {{.TOOLS_DIR}}/weaver
      - rm -rf /tmp/weaver.tar.xz /tmp/weaver-x86_64-unknown-linux-gnu/
      - weaver --version
    status:
      - test -x {{.TOOLS_DIR}}/weaver
      - weaver --version | grep -q "{{.WEAVER_VERSION}}"

  install-complyctl:
    desc: "Install complyctl with SHA256 verification"
    vars:
      COMPLYCTL_VERSION: "v1.0.0-alpha.0"
      COMPLYCTL_URL: "https://github.com/complytime/complyctl/releases/download/{{.COMPLYCTL_VERSION}}/complyctl_linux_x86_64.tar.gz"
    cmds:
      - curl -fL -o /tmp/complyctl.tar.gz "{{.COMPLYCTL_URL}}"
      - |
        COMPLYCTL_SHA=$(grep "complyctl/{{.COMPLYCTL_VERSION}}/linux/x86_64" {{.CHECKSUMS_FILE}} | cut -d: -f2 | tr -d ' ')
        echo "${COMPLYCTL_SHA}  /tmp/complyctl.tar.gz" | sha256sum -c -
      - tar -xzf /tmp/complyctl.tar.gz -C /tmp
      - install /tmp/complyctl {{.TOOLS_DIR}}/complyctl
      - rm -rf /tmp/complyctl.tar.gz /tmp/complyctl /tmp/LICENSE /tmp/README.md /tmp/openscap-plugin
      - complyctl version
    status:
      - test -x {{.TOOLS_DIR}}/complyctl

  install-all:
    desc: "Install all external tools"
    cmds:
      - task: install-weaver
      - task: install-complyctl
